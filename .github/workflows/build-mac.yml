name: Build Mac

# Cross-build .dmg pour Mac (x64 + arm64) sur un runner macOS GitHub Actions.
# Trigger auto à chaque release publiée (Windows), OU manuel via workflow_dispatch.
# Les artifacts sont uploadés au même release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de la release à builder (ex: v0.2.0)'
        required: true
        default: 'v0.2.0'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install electron-app dependencies
        working-directory: electron-app
        run: npm install

      - name: Write Apple API key (.p8) for notarization
        run: |
          mkdir -p "$RUNNER_TEMP/apple"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/apple/AuthKey.p8"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

      - name: Build Mac (.dmg x64 + arm64, signed + notarized) and upload to GitHub release
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/apple/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npx electron-builder --mac --publish always
